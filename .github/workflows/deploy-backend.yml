name: Deploy Backend To AWS

on:
  push:
    branches:
      - main
    paths:
      - "api-backend-fixed/**"
      - "aws/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend on EC2
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate backend env file
        shell: bash
        env:
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE || 'api-backend-fixed/.env' }}
        run: |
          set -euo pipefail
          if [ ! -f "$EC2_ENV_FILE" ]; then
            echo "Env file not found on runner: $EC2_ENV_FILE"
            exit 1
          fi

      - name: Deploy backend locally on EC2 runner
        shell: bash
        env:
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE || 'api-backend-fixed/.env' }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail

          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            bash -lc "$DEPLOY_COMMAND"
            exit 0
          fi

          docker build -t api-vendor-backend:latest api-backend-fixed
          docker rm -f api-vendor-backend || true
          docker run -d \
            --restart unless-stopped \
            --name api-vendor-backend \
            -p 8000:8000 \
            --env-file "$EC2_ENV_FILE" \
            api-vendor-backend:latest

          docker ps --filter "name=api-vendor-backend"

      - name: Verify backend
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..24}; do
            if curl --fail --show-error --silent --max-time 10 http://127.0.0.1:8000/; then
              exit 0
            fi
            echo "Backend is not ready yet; retry ${attempt}/24..."
            sleep 5
          done

          echo "Backend verification failed after retries."
          exit 1
