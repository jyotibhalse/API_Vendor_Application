name: Deploy Backend To AWS

on:
  push:
    branches:
      - main
    paths:
      - "api-backend-fixed/**"
      - "aws/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy backend on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/api_backend_key
          chmod 600 ~/.ssh/api_backend_key
          ssh-keyscan -p "${{ secrets.EC2_SSH_PORT || '22' }}" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_ENV_FILE: ${{ secrets.EC2_ENV_FILE || 'api-backend-fixed/.env' }}
          DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/api_backend_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$EC2_APP_DIR' EC2_ENV_FILE='$EC2_ENV_FILE' DEPLOY_COMMAND='$DEPLOY_COMMAND' bash -s" <<'REMOTE'
          set -euo pipefail

          if [ -z "${APP_DIR:-}" ]; then
            echo "EC2_APP_DIR secret is required."
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

          if [ -n "${DEPLOY_COMMAND:-}" ]; then
            bash -lc "$DEPLOY_COMMAND"
            exit 0
          fi

          if [ ! -f "$EC2_ENV_FILE" ]; then
            echo "Env file not found: $EC2_ENV_FILE"
            exit 1
          fi

          docker build -t api-vendor-backend:latest api-backend-fixed
          docker rm -f api-vendor-backend || true
          docker run -d \
            --restart unless-stopped \
            --name api-vendor-backend \
            -p 8000:8000 \
            --env-file "$EC2_ENV_FILE" \
            api-vendor-backend:latest

          docker ps --filter "name=api-vendor-backend"
          REMOTE

      - name: Verify load balancer
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --max-time 30 \
            "http://api-ba-Appli-3rQ8Rx47DyPA-902428055.ap-south-1.elb.amazonaws.com/"
