name: Build Mobile Apps

on:
  push:
    branches:
      - main
    paths:
      - "vendor-app-fixed/**"
      - ".github/workflows/build-mobile.yml"
  workflow_dispatch:

concurrency:
  group: build-mobile
  cancel-in-progress: true

jobs:
  android:
    name: Build Android APK
    runs-on: [self-hosted, linux, x64]

    defaults:
      run:
        working-directory: vendor-app-fixed

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vendor-app-fixed/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: api-vendor-android-apk
          path: vendor-app-fixed/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    name: Build iOS simulator app
    runs-on: macos-latest

    defaults:
      run:
        working-directory: vendor-app-fixed

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vendor-app-fixed/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS project
        run: npx cap sync ios

      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package iOS simulator app
        run: |
          cd ios/build/Build/Products/Debug-iphonesimulator
          zip -r ../../../../../api-vendor-ios-simulator-app.zip App.app

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: api-vendor-ios-simulator-app
          path: vendor-app-fixed/api-vendor-ios-simulator-app.zip
