name: Deploy Frontend To AWS

on:
  push:
    branches:
      - main
    paths:
      - "vendor-app-fixed/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy frontend on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare SSH key
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$EC2_HOST" ] || missing+=("EC2_HOST")
          [ -n "$EC2_SSH_KEY" ] || missing+=("EC2_SSH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/api_frontend_key
          chmod 600 ~/.ssh/api_frontend_key
          ssh-keyscan -p "$EC2_SSH_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          FRONTEND_API_URL: ${{ secrets.FRONTEND_API_URL }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "$EC2_HOST" ] || missing+=("EC2_HOST")
          [ -n "$EC2_USER" ] || missing+=("EC2_USER")
          [ -n "$EC2_APP_DIR" ] || missing+=("EC2_APP_DIR")
          [ -n "$FRONTEND_API_URL" ] || missing+=("FRONTEND_API_URL")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}"
            exit 1
          fi

          ssh -i ~/.ssh/api_frontend_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$EC2_APP_DIR' FRONTEND_API_URL='$FRONTEND_API_URL' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

          docker build \
            --build-arg VITE_API_URL="$FRONTEND_API_URL" \
            -t api-vendor-frontend:latest \
            vendor-app-fixed
          docker rm -f api-vendor-frontend || true
          docker rm -f api_vendor_application-frontend-1 || true
          docker run -d \
            --restart unless-stopped \
            --name api-vendor-frontend \
            -p 3000:80 \
            api-vendor-frontend:latest

          docker ps --filter "name=api-vendor-frontend"
          REMOTE
