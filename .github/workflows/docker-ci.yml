name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  docker-ci:
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: api-vendor-backend:ci
      FRONTEND_IMAGE: api-vendor-frontend:ci
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker buildx build --load -t "$BACKEND_IMAGE" ./api-backend-fixed

      - name: Build frontend Docker image
        run: docker buildx build --load --build-arg VITE_API_URL=http://localhost:8000 -t "$FRONTEND_IMAGE" ./vendor-app-fixed

      - name: Run docker compose stack
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Check containers status
        run: docker compose ps

      - name: Verify running services
        run: |
          running_services="$(docker compose ps --services --status running)"
          echo "$running_services"
          grep -qx "postgres" <<< "$running_services"
          grep -qx "backend" <<< "$running_services"
          grep -qx "frontend" <<< "$running_services"
          curl -fsS http://localhost:8000/
          curl -fsS http://localhost:3000/

      - name: Show docker compose logs
        if: always()
        run: docker compose logs --no-color --tail=200

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Push backend and frontend images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          docker tag "$BACKEND_IMAGE" "$DOCKER_USERNAME/api-vendor-backend:latest"
          docker tag "$FRONTEND_IMAGE" "$DOCKER_USERNAME/api-vendor-frontend:latest"
          docker push "$DOCKER_USERNAME/api-vendor-backend:latest"
          docker push "$DOCKER_USERNAME/api-vendor-frontend:latest"

      - name: Skip Docker Hub push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && (env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == '')
        run: echo "Docker Hub credentials are not set. Skipping image push."

      - name: Tear down stack
        if: always()
        run: docker compose down -v
